  <!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Merix Fox</title>

  <!-- خطوط -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

  <!-- Font Awesome (أيقونات) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- CSS خارجي -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light arabic">

  <!-- Navbar ثابت -->
  <nav class="sticky-nav">
    <div class="nav-container">
      <div class="logo" id="siteTitle">Merix Fox</div>

      <!-- روابط وسطية (تبتعد عن جوانب الشاشة عبر container) -->
      <div class="nav-links" id="navLinks">
        <a href="#videos" id="videosLink">الفيديوهات</a>
        <a href="#socials" id="contactLink">التواصل</a>
      </div>

      <div class="nav-buttons">
        <button id="themeBtn" class="icon-btn" aria-label="toggle theme"><span id="icon">☀️</span></button>
        <button id="langBtn" class="icon-btn" aria-label="toggle language"><span id="langText">عربي</span></button>
        <button id="burgerBtn" class="burger-btn" aria-label="menu">☰</button>
      </div>
    </div>
  </nav>

  <main>
    <section class="content">
      <img src="https://i.ibb.co/PvKfZqDR/merix.png" alt="Merix Fox" class="profile-img">
      <h2 id="introTitle">مرحباً! أنا Merix Fox 🦊</h2>
      <p id="introText">أنا مطور ألعاب عربي مبتدئ من مصر... ومصمم أنميشن مبتدئ كمان</p>
      <p id="introText2">أتمنى يعجبك محتواي</p>
    </section>

    <section class="videos" id="videos">
      <h3 class="videosTitle">الفيديوهات</h3>

      <div class="video-list">
        <a class="video-link" href="https://youtu.be/wADsAxaR36s?si=LKNtkcU1b84xZxTe" target="_blank">
          <div class="video-item">
            <img src="https://img.youtube.com/vi/wADsAxaR36s/0.jpg" alt="">
            <p class="video-label trending">الرائج</p>
          </div>
        </a>

        <a class="video-link" href="https://youtu.be/8qvQ3IXI9as?si=hFpRiB5G45gfNIO9" target="_blank">
          <div class="video-item">
            <img src="https://img.youtube.com/vi/8qvQ3IXI9as/0.jpg" alt="">
            <p class="video-label recommended">قد يعجبك</p>
          </div>
        </a>
      </div>
    </section>

    <section class="socials" id="socials">
      <h3 class="socialTitle">روابط التواصل</h3>
      <div class="links">
        <a href="https://www.youtube.com/@MerixFox" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://www.instagram.com/merixfox/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
    </section>
  </main>

  <footer>
    <p class="footerText">جميع الحقوق محفوظة لـ Merix Fox</p>
  </footer>

  <!-- JS خارجي -->
  <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
